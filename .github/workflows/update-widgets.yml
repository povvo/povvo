name: Update Povvo widgets

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"
  push:
    paths:
      - "widgets/source-parts/**"
      - "widgets/generate.py"
      - "widgets/validate.py"
      - "widgets/config.json"
      - "widgets/requirements.txt"
      - "widgets/PROFILE-README.md"
      - "assets/banner.png"
      - "assets/logo.png"

permissions:
  contents: write

concurrency:
  group: povvo-profile-widgets
  cancel-in-progress: false

jobs:
  render:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: widgets/requirements.txt
      - name: Assemble bootstrap sources
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import zlib

          root = Path("widgets/source-parts")
          for name in ("generate.py", "validate.py"):
              parts = sorted(root.glob(f"{name}.z85.part.*"))
              if parts:
                  payload = "".join(part.read_text() for part in parts)
                  Path("widgets", name).write_bytes(zlib.decompress(base64.b85decode(payload)))
          PY
      - name: Install renderer
        run: python -m pip install -r widgets/requirements.txt
      - name: Generate widgets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python widgets/generate.py --config widgets/config.json --output widgets/generated
      - name: Validate widgets
        run: python widgets/validate.py
      - name: Publish profile
        run: |
          cp widgets/PROFILE-README.md README.md
          rm -rf widgets/source-parts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No widget changes"
            exit 0
          fi
          git commit -m "chore(profile): refresh Povvo widgets"
          git push
