<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-labelledby="title desc">
<title id="title">Povvo event rail</title>
<desc id="desc">Up to six distinct recent public GitHub events for @povvo, ordered from most recent to oldest.</desc>
<defs>
<linearGradient id="edge" x1="0" x2="1"><stop offset="0" stop-color="#0B2B34" stop-opacity="0"/><stop offset="1" stop-color="#0B2B34" stop-opacity="0.085"/></linearGradient>
<pattern id="grain" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="2" cy="4" r=".45" fill="#DCE4DF"/><circle cx="13" cy="8" r=".35" fill="#DCE4DF"/><circle cx="7" cy="17" r=".3" fill="#DCE4DF"/></pattern>
<style>
.micro{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:10px;font-weight:700;letter-spacing:1.1px;fill:#25343A}
.micro9{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:9px;font-weight:700;letter-spacing:1px;fill:#25343A}
.body{font-family:Inter,Arial,Helvetica,sans-serif;font-size:14px;font-weight:600;fill:#050706}
.bodybold{font-family:Inter,Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;fill:#050706}
.display{font-family:Inter,Arial Narrow,Helvetica,sans-serif;font-size:27px;font-weight:900;font-style:italic;fill:#050706;font-variant-numeric:tabular-nums}
.utility{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;font-weight:700;fill:#050706;font-variant-numeric:tabular-nums}
.inverse{fill:#D8ECF8}
</style>
</defs>
<rect width="900" height="220" fill="#F4F6F1"/>
<rect width="900" height="220" fill="url(#grain)" opacity=".18"/>
<rect x=".5" y=".5" width="899" height="219" fill="none" stroke="#6E9DB2" stroke-opacity=".72"/>
<rect x="872" width="28" height="220" fill="url(#edge)"/>
<text x="40" y="42" class="micro">EVENT RAIL / 04</text>
<path d="M40 53H70" stroke="#050706" stroke-width="1.25"/>
<path d="M70 53H106" stroke="#6E9DB2" stroke-width=".8"/>
<path d="M72 86H788" stroke="#050706" stroke-width="1.8"/>
<path d="M72.0 72V100" stroke="#6E9DB2" stroke-width="1"/>
<circle cx="72.0" cy="86" r="4" fill="#050706"/>
<text x="72.0" y="115" text-anchor="middle" class="micro9">PUSH</text>
<text x="72.0" y="139" text-anchor="middle" class="bodybold" style="font-size:12px">povvo</text>
<text x="72.0" y="161" text-anchor="middle" class="micro9" style="font-size:8px">2026-07-12</text>
<path d="M310.66666666666663 72V100" stroke="#6E9DB2" stroke-width="1"/>
<circle cx="310.66666666666663" cy="86" r="4" fill="#050706"/>
<text x="310.66666666666663" y="115" text-anchor="middle" class="micro9">CREATE</text>
<text x="310.66666666666663" y="139" text-anchor="middle" class="bodybold" style="font-size:12px">povvo</text>
<text x="310.66666666666663" y="161" text-anchor="middle" class="micro9" style="font-size:8px">2026-07-12</text>
<path d="M549.3333333333333 72V100" stroke="#6E9DB2" stroke-width="1"/>
<circle cx="549.3333333333333" cy="86" r="4" fill="#050706"/>
<text x="549.3333333333333" y="115" text-anchor="middle" class="micro9">CREATE</text>
<text x="549.3333333333333" y="139" text-anchor="middle" class="bodybold" style="font-size:12px">.github</text>
<text x="549.3333333333333" y="161" text-anchor="middle" class="micro9" style="font-size:8px">2026-07-12</text>
<path d="M788.0 72V100" stroke="#6E9DB2" stroke-width="1"/>
<circle cx="788.0" cy="86" r="4" fill="#050706"/>
<text x="788.0" y="115" text-anchor="middle" class="micro9">CREATE</text>
<text x="788.0" y="139" text-anchor="middle" class="bodybold" style="font-size:12px">povvo</text>
<text x="788.0" y="161" text-anchor="middle" class="micro9" style="font-size:8px">2026-07-11</text>
<path d="M54.0 62h8M54.0 62v8 M82.0 62h8M90.0 62v8 M54.0 170v8M54.0 178h8 M90.0 170v8M82.0 178h8" fill="none" stroke="#6E9DB2" stroke-width="1.2"/>
<text x="40" y="209" class="micro9">PUBLIC EVENTS / MOST RECENT FIRST</text>
</svg>